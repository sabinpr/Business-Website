<!doctype html>

  <head>

    <link
      rel="stylesheet"

      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css"
    />

    <!-- 2. Add Splide JS to the bottom of the <body> -->
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

  <body>

          <a href="./index.html">
            <div class="logo">BUSINESS</div>

          <!-- 1. Hidden Checkbox -->
          <input type="checkbox" id="nav-toggle" class="nav-toggle" />

          <!-- 2. Hamburger Icon -->
          <label for="nav-toggle" class="nav-toggle-label">
            <span></span>
          </label>

          <ul class="nav-links">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About Us</a></li>

            </button>

        </div>

    </header>
    <main>

      <section class="page-heading-section section-padding-top">
        <img src="./images/head-banner.png" alt="Banner" class="head-banner" />
        <div class="container">

      </section>

      <!-- 7. PROJECTS / PORTFOLIO -->
      <section class="blogs-section inner-padding">
        <div class="container">
          <div class="blog-grid" id="blog-grid">
            <!-- JavaScript will inject cards here -->
          </div>

          <!-- Load More Button -->
          <div class="load-more-container">
            <button id="load-more-btn" class="btn-primary">Load More</button>
          </div>
        </div>
      </section>
    </main>

    <!-- 11. FOOTER -->
    <footer>
      <div class="footer-content">
        <div class="container">
          <a href="./index.html">
            <div class="footer-logo">BUSINESS</div>
          </a>
          <ul class="footer-links">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./about.html">About Us</a></li>
            <li><a href="./services.html">Services</a></li>
